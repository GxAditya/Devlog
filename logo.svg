<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
    <defs>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fcf6ba" />
            <stop offset="25%" stop-color="#bf953f" />
            <stop offset="50%" stop-color="#fbf5b7" />
            <stop offset="75%" stop-color="#b38728" />
            <stop offset="100%" stop-color="#fcf6ba" />
        </linearGradient>
        <radialGradient id="metalCore" cx="40%" cy="40%" r="60%">
            <stop offset="0%" stop-color="#2a2a2a" />
            <stop offset="50%" stop-color="#060606" />
            <stop offset="100%" stop-color="#000000" />
        </radialGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#d4af37" flood-opacity="0.4"/>
        </filter>
    </defs>
    <!-- Base Card -->
    <rect x="10" y="10" width="100" height="100" rx="16" fill="url(#metalCore)" stroke="#000" stroke-width="2" />
    
    <!-- Outer Border -->
    <rect x="15" y="15" width="90" height="90" rx="12" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.9" />
    
    <!-- Inner Dotted Frame like Obsidian Card -->
    <rect x="18" y="18" width="84" height="84" rx="9" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" stroke-dasharray="2, 4" opacity="0.6" />

    <!-- Letter D Outline & Serifs -->
    <g filter="url(#glow)">
        <path d="M 40 33 L 64 33 C 78 33 86 42 86 60 C 86 78 78 87 64 87 L 40 87 Z M 48 38 L 48 82 L 60 82 C 70 82 76 75 76 60 C 76 45 70 38 60 38 Z" fill="url(#goldGrad)" fill-rule="evenodd" />
        <rect x="34" y="32" width="16" height="4" fill="url(#goldGrad)" />
        <rect x="34" y="84" width="16" height="4" fill="url(#goldGrad)" />
    </g>
</svg>
